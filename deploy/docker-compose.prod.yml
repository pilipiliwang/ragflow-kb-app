services:
  rag-kb-app:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: "4317"
      SQLITE_PATH: /data/app.sqlite
      UPLOAD_STAGING_PATH: /data/pending-uploads
      APP_SECRET: ${APP_SECRET}
      APP_INVITE_CODES: ${APP_INVITE_CODES}
      EXTERNAL_API_KEYS: ${EXTERNAL_API_KEYS}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-None}
      CORS_ORIGINS: ${CORS_ORIGINS}
      RAGFLOW_BASE_URL: ${RAGFLOW_BASE_URL}
      RAGFLOW_API_KEY: ${RAGFLOW_API_KEY}
      RAGFLOW_DATASET_NAME: ${RAGFLOW_DATASET_NAME:-web-materials}
      RAGFLOW_CHAT_NAME: ${RAGFLOW_CHAT_NAME:-web-materials-assistant}
      RAGFLOW_REQUEST_TIMEOUT_MS: ${RAGFLOW_REQUEST_TIMEOUT_MS:-30000}
      RAGFLOW_REQUEST_RETRIES: ${RAGFLOW_REQUEST_RETRIES:-2}
      RAGFLOW_PARSE_WAIT_MS: ${RAGFLOW_PARSE_WAIT_MS:-45000}
      RAGFLOW_PARSE_POLL_MS: ${RAGFLOW_PARSE_POLL_MS:-3000}
      DIRECT_AI_BASE_URL: ${DIRECT_AI_BASE_URL:-https://api.openai.com/v1}
      DIRECT_AI_API_KEY: ${DIRECT_AI_API_KEY}
      DIRECT_AI_MODEL: ${DIRECT_AI_MODEL}
      DIRECT_AI_TIMEOUT_MS: ${DIRECT_AI_TIMEOUT_MS:-60000}
    volumes:
      - rag-kb-data:/data
    networks:
      - ragflow
      - web

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - rag-kb-app
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - web

volumes:
  rag-kb-data:
  caddy-data:
  caddy-config:

networks:
  ragflow:
    name: ragflow
    external: true
  web:
