<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RAGFlow 知识库问答</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
    <script src="./api.js" defer></script>
    <script src="./app.js" defer></script>
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar">
        <div class="brand">
          <div>
            <h1>知识库问答</h1>
            <p id="statusText">连接中...</p>
          </div>
          <a class="icon-button" href="./admin.html" title="后台">
            <i data-lucide="settings"></i>
          </a>
        </div>

        <section class="import-panel">
          <div class="section-title">
            <h2>导入材料</h2>
            <span class="badge">RAGFlow</span>
          </div>
          <div class="operation-group">
            <div class="operation-head">
              <div>
                <h3>本地文件</h3>
                <p>文件会先加入待上传列表，再统一提交到 RAGFlow。</p>
              </div>
            </div>
            <label class="drop-zone" for="fileInput" id="dropZone">
              <i data-lucide="file-up"></i>
              <span>选择或拖入文件</span>
              <small>可多选，也可以分多次选择；文件会先加入待上传列表</small>
            </label>
            <input id="fileInput" class="native-file-input" type="file" multiple />
            <div id="filePreview" class="file-preview empty compact-empty">尚未选择文件。</div>
            <div class="action-bar">
              <button class="primary-button" id="uploadButton" type="button">
                <i data-lucide="upload-cloud"></i>
                上传待选文件
              </button>
              <button class="secondary-button" id="clearFilesButton" type="button">
                <i data-lucide="x"></i>
                清空
              </button>
            </div>
            <div id="importNotice" class="notice inline-notice"></div>
          </div>

          <div class="operation-group">
            <div class="operation-head">
              <div>
                <h3>网页 URL</h3>
                <p>每行一个网址；不粘贴时不会导入网页。</p>
              </div>
            </div>
            <textarea id="urlInput" rows="4" placeholder="https://example.com/page"></textarea>
            <button class="primary-button" id="urlButton" type="button">
              <i data-lucide="globe-2"></i>
              导入/刷新 URL
            </button>
            <div id="urlNotice" class="notice inline-notice"></div>
          </div>
        </section>

        <section class="source-list-wrap">
          <div class="section-title">
            <h2>资料源</h2>
            <button class="text-button" id="refreshSourcesButton" type="button">刷新</button>
          </div>
          <p class="section-help">这里是当前 RAGFlow 知识库资料，不是历史记录；状态为“可检索”的资料会参与本次 RAG 问答。</p>
          <div id="sourceList" class="source-list"></div>
        </section>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <h2>RAG 搜索问答 vs 直接大模型问答</h2>
            <p>同一个问题会同时走 RAGFlow 知识库和直接模型，便于对比差异。</p>
          </div>
          <div class="button-row">
            <a class="secondary-button link-button" href="./login.html">连接后端</a>
            <button class="text-button danger" id="logoutButton" type="button">退出</button>
          </div>
        </header>

        <section class="question-panel">
          <div class="question-grid">
            <div>
              <label class="field-label" for="questionInput">问题</label>
              <textarea id="questionInput" rows="4" placeholder="例如：家族信托怎么降低受益人挥霍风险？"></textarea>
            </div>
            <div class="options-panel">
              <div class="model-head">
                <label class="field-label" for="modelSelect">直接大模型</label>
                <button class="text-button compact-link" id="toggleDirectConfigButton" type="button">配置 API Key / 模型</button>
              </div>
              <select id="modelSelect"></select>
              <div id="modelHint" class="model-hint"></div>
              <div id="directConfigPanel" class="direct-config-panel">
                <label>
                  <span>常用模型</span>
                  <select id="directPresetSelect">
                    <option value="">手动填写</option>
                    <option value="MiniMax-M3" data-base-url="https://api.minimax.io/v1">MiniMax M3</option>
                    <option value="deepseek-chat" data-base-url="https://api.deepseek.com/v1">DeepSeek Chat</option>
                    <option value="qwen-plus" data-base-url="https://dashscope.aliyuncs.com/compatible-mode/v1">通义千问 qwen-plus</option>
                    <option value="gpt-4o-mini" data-base-url="https://api.openai.com/v1">OpenAI gpt-4o-mini</option>
                  </select>
                </label>
                <label>
                  <span>Base URL</span>
                  <input id="directBaseUrlInput" class="text-input" placeholder="例如 https://api.deepseek.com/v1" />
                </label>
                <label>
                  <span>API Key</span>
                  <input id="directApiKeyInput" class="text-input" type="password" autocomplete="off" placeholder="只保存到本机后端，接口不会明文回显" />
                </label>
                <label>
                  <span>模型名</span>
                  <input id="directModelInput" class="text-input" placeholder="例如 deepseek-chat / qwen-plus" />
                </label>
                <button class="secondary-button compact" id="saveDirectConfigButton" type="button">
                  <i data-lucide="save"></i>
                  保存直接模型配置
                </button>
                <div id="directConfigNotice" class="model-hint"></div>
              </div>
              <label class="toggle">
                <input id="refreshUrlsToggle" type="checkbox" checked />
                <span>回答前刷新 URL 源</span>
              </label>
              <button class="primary-button" id="askButton" type="button">
                <i data-lucide="split-square-horizontal"></i>
                对比问答
              </button>
            </div>
          </div>
          <div id="notice" class="notice"></div>
        </section>

        <section class="compare-grid">
          <article class="answer-card">
            <div class="section-title">
              <h2>RAGFlow RAG 问答</h2>
              <span id="ragMeta" class="badge">未运行</span>
            </div>
            <pre id="ragAnswer" class="answer-box">等待提问。</pre>
            <div>
              <h3>引用来源</h3>
              <div id="references" class="references"></div>
            </div>
          </article>

          <article class="answer-card">
            <div class="section-title">
              <h2>直接大模型问答</h2>
              <span id="directMeta" class="badge muted-badge">未运行</span>
            </div>
            <pre id="directAnswer" class="answer-box">等待提问。</pre>
          </article>
        </section>
      </main>
    </div>
  </body>
</html>
